<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Star Gifts Deluxe V2</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
--cyan:#00f7ff;
--pink:#ff2ad4;
--purple:#6d39ff;
--gold:#ffd54a;
--bg:#05060b;
--panel:rgba(10,12,22,.72);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
height:100vh;
overflow:hidden;
background:
linear-gradient(180deg,#130822 0%,#0a0b15 40%,#05060b 100%);
display:flex;
justify-content:center;
align-items:center;
}

/* SKYLINE */
.sky{
position:fixed; inset:0;
overflow:hidden;
z-index:0;
}
.sun{
position:absolute;
left:50%;
top:10%;
transform:translateX(-50%);
width:220px;height:220px;border-radius:50%;
background:radial-gradient(circle,#ff8a00 0%,#ff2ad4 55%,transparent 70%);
filter:blur(10px);
opacity:.9;
}
.city{
position:absolute;
bottom:36%;
left:0;right:0;height:180px;
display:flex;align-items:flex-end;
gap:6px;padding:0 10px;
}
.b{
flex:1;
background:linear-gradient(180deg,#11152d,#0a0c18);
border:1px solid rgba(0,247,255,.08);
box-shadow:0 0 12px rgba(0,247,255,.08);
position:relative;
}
.b:after{
content:'';
position:absolute;inset:8px;
background:
repeating-linear-gradient(
180deg,
rgba(255,255,255,.07) 0 4px,
transparent 4px 9px
);
opacity:.6;
}
.grid{
position:absolute;
left:-30%;
right:-30%;
bottom:-10%;
height:45%;
transform:perspective(420px) rotateX(68deg);
background:
repeating-linear-gradient(
90deg,
rgba(0,247,255,.18) 0 2px,
transparent 2px 52px
),
repeating-linear-gradient(
180deg,
rgba(0,247,255,.18) 0 2px,
transparent 2px 52px
);
animation:gridmove 7s linear infinite;
}
@keyframes gridmove{
from{background-position:0 0,0 0;}
to{background-position:0 0,0 52px;}
}

/* APP */
.wrap{
position:relative;
z-index:2;
width:94%;
max-width:410px;
padding:16px;
border-radius:28px;
background:var(--panel);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 0 30px rgba(0,247,255,.15),
0 0 70px rgba(255,42,212,.08);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
font-size:13px;
color:var(--cyan);
font-weight:bold;
}

.balance{
padding:14px;
border-radius:20px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.06);
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.big{
font-size:28px;
font-weight:900;
color:var(--gold);
text-shadow:0 0 12px rgba(255,213,74,.4);
}

.small{
font-size:11px;
opacity:.7;
}

.btn{
border:none;
cursor:pointer;
padding:12px 14px;
border-radius:14px;
font-weight:800;
color:#fff;
background:linear-gradient(90deg,var(--cyan),var(--purple));
box-shadow:0 0 16px rgba(0,247,255,.25);
}

.reels{
height:320px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
border-radius:24px;
background:#02040a;
border:2px solid rgba(255,255,255,.06);
margin-bottom:14px;
}

.col{
display:grid;
grid-template-rows:repeat(3,1fr);
gap:8px;
}

.cell{
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
background:linear-gradient(180deg,#13182d,#0a0d18);
border:1px solid rgba(255,255,255,.06);
box-shadow:inset 0 0 10px rgba(255,255,255,.03);
transition:.18s;
}

.win{
box-shadow:
0 0 20px rgba(255,213,74,.8),
inset 0 0 14px rgba(255,213,74,.4);
transform:scale(1.05);
}

.betrow{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-bottom:12px;
}

.bet{
padding:10px;
border-radius:12px;
text-align:center;
font-weight:800;
background:#101527;
border:1px solid rgba(0,247,255,.3);
color:var(--cyan);
cursor:pointer;
}

.bet.active{
background:linear-gradient(90deg,var(--cyan),var(--purple));
color:#fff;
}

.spin{
width:100%;
padding:18px;
font-size:24px;
font-weight:900;
border:none;
border-radius:18px;
cursor:pointer;
color:#fff;
background:linear-gradient(90deg,#ff2ad4,#ff7a00);
box-shadow:0 0 24px rgba(255,42,212,.35);
}

.log{
height:24px;
text-align:center;
margin-top:10px;
font-weight:700;
color:var(--cyan);
font-size:14px;
}

/* MODAL */
.modal{
position:fixed; inset:0;
background:rgba(0,0,0,.65);
display:none;
justify-content:center;
align-items:center;
z-index:5;
}

.card{
width:92%;
max-width:380px;
padding:18px;
border-radius:24px;
background:#090c16;
border:1px solid rgba(0,247,255,.25);
box-shadow:0 0 30px rgba(0,247,255,.15);
}

.gridpay{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin:14px 0;
}

.pay{
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
font-weight:800;
background:#11162a;
border:1px solid rgba(255,42,212,.25);
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
outline:none;
background:#13182d;
color:#fff;
margin-bottom:12px;
font-size:16px;
}
</style>
</head>
<body>

<div class="sky">
<div class="sun"></div>
<div class="city">
<div class="b" style="height:60%"></div>
<div class="b" style="height:85%"></div>
<div class="b" style="height:70%"></div>
<div class="b" style="height:95%"></div>
<div class="b" style="height:55%"></div>
<div class="b" style="height:80%"></div>
<div class="b" style="height:68%"></div>
<div class="b" style="height:100%"></div>
</div>
<div class="grid"></div>
</div>

<div class="wrap">
<div class="top">
<div id="lvl">LEVEL 1</div>
<div id="xp">0 XP</div>
</div>

<div class="balance">
<div>
<div class="small">CHIPS</div>
<div class="big" id="chips">0</div>
<div class="small" id="starsEq">≈ 0 ⭐</div>
</div>
<button class="btn" onclick="openWallet()">TOP UP</button>
</div>

<div class="reels" id="reels"></div>

<div class="betrow">
<div class="bet active" onclick="setBet(10)">10</div>
<div class="bet" onclick="setBet(50)">50</div>
<div class="bet" onclick="setBet(100)">100</div>
<div class="bet" onclick="setBet(500)">500</div>
</div>

<button class="spin" onclick="spin()" id="spinBtn">SPIN</button>
<div class="log" id="log">READY TO WIN</div>
</div>

<div class="modal" id="wallet">
<div class="card">
<h3 style="margin:0;color:var(--cyan)">CYBER WALLET</h3>

<div class="gridpay">
<div class="pay" onclick="topup(5)">5⭐</div>
<div class="pay" onclick="topup(20)">20⭐</div>
<div class="pay" onclick="topup(50)">50⭐</div>
<div class="pay" onclick="topup(100)">100⭐</div>
<div class="pay" onclick="topup(500)">500⭐</div>
<div class="pay" onclick="topup(1000)">1000⭐</div>
</div>

<input type="number" id="custom" placeholder="Custom Stars Amount">
<button class="btn" style="width:100%" onclick="customTopup()">CHARGE</button>
<br><br>
<button class="btn" style="width:100%;background:#222" onclick="closeWallet()">CLOSE</button>
</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const SYMBOLS = ["⭐","🎁","👑","💎","🚀","🤖"];
const VALUE = { "⭐":2,"🎁":5,"👑":12,"💎":25,"🚀":60,"🤖":100 };

let data = JSON.parse(localStorage.getItem("cyber_slot_v2")) || {
chips:0,
lvl:1,
xp:0
};

let bet = 10;
let spinning = false;

function save(){
localStorage.setItem("cyber_slot_v2",JSON.stringify(data));
}

function render(){
chips.innerText = data.chips.toLocaleString();
starsEq.innerText = "≈ " + Math.floor(data.chips/10) + " ⭐";
lvl.innerText = "LEVEL " + data.lvl;
xp.innerText = data.xp + " XP";
save();
draw();
}

function draw(){
reels.innerHTML='';
for(let c=0;c<3;c++){
let col=document.createElement('div');
col.className='col';
for(let r=0;r<3;r++){
let cell=document.createElement('div');
cell.className='cell';
cell.innerText = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
col.appendChild(cell);
}
reels.appendChild(col);
}
}

function setBet(v){
bet=v;
document.querySelectorAll('.bet').forEach(x=>x.classList.remove('active'));
event.target.classList.add('active');
}

function openWallet(){ wallet.style.display='flex'; }
function closeWallet(){ wallet.style.display='none'; }

function topup(stars){
data.chips += stars*10;
render();
closeWallet();
log.innerText = "+"+(stars*10)+" CHIPS";
}

function customTopup(){
let v=parseInt(custom.value||0);
if(v>0) topup(v);
}

function spin(){
if(spinning) return;
if(data.chips < bet){
log.innerText="NOT ENOUGH CHIPS";
return;
}

spinning=true;
data.chips -= bet;
render();

let cells=[...document.querySelectorAll('.cell')];
let t=0;
let anim=setInterval(()=>{
cells.forEach(c=>c.innerText=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]);
t++;
if(t>18){
clearInterval(anim);
finish();
}
},90);
}

function finish(){
let cols=[...document.querySelectorAll('.col')];
let grid=[];

cols.forEach(col=>{
let arr=[];
[...col.children].forEach(c=>{
let s=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
c.innerText=s;
c.classList.remove('win');
arr.push(s);
});
grid.push(arr);
});

let win=0;

for(let r=0;r<3;r++){
if(grid[0][r]==grid[1][r] && grid[1][r]==grid[2][r]){
win += bet * VALUE[grid[0][r]];
cols[0].children[r].classList.add('win');
cols[1].children[r].classList.add('win');
cols[2].children[r].classList.add('win');
}
}

if(win>0){
data.chips += win;
log.innerText = "JACKPOT +" + win;
}else{
log.innerText = "TRY AGAIN";
}

data.xp += Math.floor(bet/2);
if(data.xp >= 100){
data.xp = 0;
data.lvl++;
data.chips += 500;
log.innerText = "LEVEL UP +500";
}

render();
spinning=false;
}

render();
</script>
</body>
</html>

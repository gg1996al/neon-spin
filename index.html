<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Gifts Deluxe 3x3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --tg-blue: #24A1DE; --gold: #ffce31; --bg: #0e1621; --card: #1c2a39; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; 
        }
        
        .machine { 
            width: 92%; max-width: 390px; background: linear-gradient(145deg, #233446, #0a1118); 
            padding: 20px; border-radius: 35px; border: 2px solid #34495e; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.9); position: relative; 
        }

        /* Level System */
        .header { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: bold; font-size: 13px; color: var(--tg-blue); }
        .xp-track { background: #000; height: 10px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        #xp-bar { background: linear-gradient(90deg, #24A1DE, #00d4ff); width: 0%; height: 100%; transition: width 0.4s ease; }

        /* Balance */
        .balance-box { 
            background: rgba(0,0,0,0.5); border-radius: 20px; padding: 15px; 
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .bal-amount { font-size: 26px; font-weight: 800; color: var(--gold); display: flex; align-items: center; gap: 6px; }
        .buy-btn { 
            background: var(--tg-blue); border: none; border-radius: 12px; color: white; 
            padding: 10px 15px; font-weight: bold; cursor: pointer; transition: 0.2s; 
        }
        .buy-btn:active { transform: scale(0.9); }

        /* REELS 3x3 */
        .reels-window { 
            background: #050505; border-radius: 20px; border: 4px solid #222; 
            margin-bottom: 20px; height: 310px; overflow: hidden; position: relative; 
            display: flex; gap: 8px; padding: 10px; 
        }
        
        /* Overlays for depth */
        .reels-window::before, .reels-window::after { 
            content: ''; position: absolute; left: 0; right: 0; height: 80px; z-index: 5; pointer-events: none; 
        }
        .reels-window::before { top: 0; background: linear-gradient(180deg, #050505 0%, rgba(5,5,5,0) 100%); }
        .reels-window::after { bottom: 0; background: linear-gradient(0deg, #050505 0%, rgba(5,5,5,0) 100%); }

        /* Payline markers */
        .payline { position: absolute; left: 0; width: 100%; height: 1px; background: rgba(255, 206, 49, 0.2); z-index: 10; }
        .p-top { top: 60px; } .p-mid { top: 160px; } .p-bot { top: 260px; }

        .reel { flex: 1; position: relative; height: 100%; }
        .reel-strip { position: absolute; width: 100%; top: 0; transition: transform 3.5s cubic-bezier(0.1, 0, 0.1, 1); }
        .symbol { height: 100px; display: flex; align-items: center; justify-content: center; padding: 12px; box-sizing: border-box; }
        .symbol img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Controls */
        .bet-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .bet-opt { 
            background: #16212e; border: 1px solid #24A1DE; border-radius: 12px; 
            color: #24A1DE; padding: 12px; font-weight: bold; cursor: pointer; 
        }
        .bet-opt.active { background: var(--tg-blue); color: white; box-shadow: 0 0 15px rgba(36,161,222,0.4); }

        .spin-trigger { 
            width: 100%; padding: 22px; background: linear-gradient(180deg, #ff416c, #ff4b2b); 
            border: none; border-radius: 20px; color: white; font-size: 24px; font-weight: 900; 
            cursor: pointer; box-shadow: 0 6px 20px rgba(255,75,43,0.4); 
        }
        .spin-trigger:disabled { filter: grayscale(1); opacity: 0.5; }

        #msg-log { margin-top: 15px; text-align: center; font-weight: bold; color: #24A1DE; min-height: 20px; }
    </style>
</head>
<body>

<div class="machine">
    <div class="header">
        <span id="lvl-txt">LEVEL 1</span>
        <span id="xp-txt">0 / 100 XP</span>
    </div>
    <div class="xp-track"><div id="xp-bar"></div></div>

    <div class="balance-box">
        <div>
            <div style="font-size: 10px; color: #666; margin-bottom: 2px;">STARS</div>
            <div class="bal-amount"><span id="bal-val">5000</span> ⭐️</div>
        </div>
        <button class="buy-btn" id="buy-action">➕ BUY</button>
    </div>

    <div class="reels-window">
        <div class="payline p-top"></div>
        <div class="payline p-mid"></div>
        <div class="payline p-bot"></div>
        
        <div class="reel"><div id="r1" class="reel-strip"></div></div>
        <div class="reel"><div id="r2" class="reel-strip"></div></div>
        <div class="reel"><div id="r3" class="reel-strip"></div></div>
    </div>

    <div class="bet-grid">
        <button class="bet-opt active" onclick="updateBet(10)">10</button>
        <button class="bet-opt" onclick="updateBet(50)">50</button>
        <button class="bet-opt" onclick="updateBet(100)">100</button>
    </div>

    <button class="spin-trigger" id="spin-btn">SPIN</button>
    <div id="msg-log">Ready to Win?</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 3D Иконки Подарков
    const SYMBOLS = [
        { id: 'gift', img: 'https://img.icons8.com/isometric/512/gift--v1.png', mult: 5 },
        { id: 'star', img: 'https://img.icons8.com/isometric/512/star.png', mult: 10 },
        { id: 'gem', img: 'https://img.icons8.com/isometric/512/ruby--v1.png', mult: 25 },
        { id: 'cup', img: 'https://img.icons8.com/isometric/512/trophy.png', mult: 70 },
        { id: 'rocket', img: 'https://img.icons8.com/isometric/512/rocket.png', mult: 200 }
    ];
    
    let player = JSON.parse(localStorage.getItem('tg_gambler_v6')) || {
        stars: 5000,
        xp: 0,
        lvl: 1,
        goal: 150
    };

    let bet = 10;
    let rolling = false;

    function refresh() {
        localStorage.setItem('tg_gambler_v6', JSON.stringify(player));
        document.getElementById('bal-val').innerText = player.stars;
        document.getElementById('lvl-txt').innerText = `LEVEL ${player.lvl}`;
        document.getElementById('xp-txt').innerText = `${player.xp} / ${player.goal} XP`;
        document.getElementById('xp-bar').style.width = `${(player.xp / player.goal) * 100}%`;
    }

    function updateBet(v) {
        if (rolling) return;
        bet = v;
        document.querySelectorAll('.bet-opt').forEach(b => b.classList.toggle('active', parseInt(b.innerText) === v));
        if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }

    // Кнопка Купить
    document.getElementById('buy-action').onclick = (e) => {
        e.preventDefault();
        tg.showConfirm("Пополнить на 1000 звезд?", (yes) => {
            if (yes) {
                player.stars += 1000;
                refresh();
                tg.showPopup({ title: 'Готово!', message: '+1000 звезд!', buttons: [{type:'ok'}] });
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        });
    };

    function initGame() {
        [1, 2, 3].forEach(id => {
            const strip = document.getElementById('r'+id);
            strip.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const div = document.createElement('div');
                div.className = 'symbol';
                const s = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                div.innerHTML = `<img src="${s.img}" data-id="${s.id}">`;
                strip.appendChild(div);
            }
        });
    }

    async function spin() {
        if (rolling || player.stars < bet) {
            if (player.stars < bet) tg.showAlert("Need more Stars! Use BUY.");
            return;
        }

        rolling = true;
        player.stars -= bet;
        refresh();
        
        document.getElementById('spin-btn').disabled = true;
        document.getElementById('msg-log').innerText = "Good Luck!";
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

        const resultGrid = [];
        [1, 2, 3].forEach(id => {
            const strip = document.getElementById('r'+id);
            const colResults = [];
            for(let j=0; j<3; j++) colResults.push(SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);
            resultGrid.push(colResults);

            for(let j=0; j<3; j++) {
                const target = strip.children[strip.children.length - (3-j)].firstElementChild;
                target.src = colResults[j].img;
                target.setAttribute('data-id', colResults[j].id);
            }
            
            const dist = (strip.children.length - 3) * 100;
            strip.style.transition = `transform ${2.5 + id*0.5}s cubic-bezier(0.1, 0, 0.1, 1)`;
            strip.style.transform = `translateY(-${dist}px)`;
        });

        setTimeout(() => {
            [1, 2, 3].forEach((id, i) => {
                const strip = document.getElementById('r'+id);
                strip.style.transition = 'none';
                strip.style.transform = 'translateY(0)';
                for(let j=0; j<3; j++) {
                    const img = strip.children[j].firstElementChild;
                    img.src = resultGrid[i][j].img;
                    img.setAttribute('data-id', resultGrid[i][j].id);
                }
            });

            checkPayouts(resultGrid);
            gainXP(bet);
            
            rolling = false;
            document.getElementById('spin-btn').disabled = false;
            refresh();
        }, 4000);
    }

    function checkPayouts(grid) {
        let win = 0;
        let lines = 0;
        // Проверка 3 горизонталей
        for(let row=0; row<3; row++) {
            if (grid[0][row].id === grid[1][row].id && grid[1][row].id === grid[2][row].id) {
                win += bet * grid[0][row].mult;
                lines++;
            }
        }

        const log = document.getElementById('msg-log');
        if (win > 0) {
            player.stars += win;
            log.innerHTML = `<span style="color:var(--gold)">WIN +${win}! (${lines} Line(s))</span>`;
            confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } else {
            log.innerText = "Try again!";
        }
    }

    function gainXP(v) {
        player.xp += Math.floor(v / 2);
        if (player.xp >= player.goal) {
            player.lvl++;
            player.xp = 0;
            player.goal = Math.floor(player.goal * 1.5);
            player.stars += 1000;
            tg.showPopup({ title: 'LEVEL UP!', message: `New Level: ${player.lvl}! +1000 Bonus Stars.`, buttons: [{type:'ok'}] });
        }
    }

    document.getElementById('spin-btn').onclick = spin;
    initGame();
    refresh();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Spin Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a12; color: #fff; font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .game-container { width: 90vw; max-width: 380px; background: #16162d; border: 5px solid #ffd700; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .reels-frame { display: flex; justify-content: space-around; background: #000; padding: 15px; border-radius: 12px; margin: 20px 0; border: 2px solid #333; }
        .reel { width: 80px; height: 80px; background: #111; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 1px solid #222; }
        .stats { display: flex; justify-content: space-between; font-size: 10px; color: #0f0; margin-bottom: 10px; }
        .spin-button { width: 100%; padding: 20px; background: #ff0044; border: none; border-radius: 15px; color: white; font-family: 'Press Start 2P', cursive; font-size: 20px; cursor: pointer; box-shadow: 0 5px 0 #440000; }
        .spin-button:active { transform: translateY(3px); box-shadow: 0 2px 0 #440000; }
        .spin-button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { height: 40px; line-height: 40px; color: #ff00ff; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="user-display" style="font-size: 10px; color: #ffd700; margin-bottom: 15px;">NEON SLOTS</div>
    <div class="reels-frame">
        <div id="slot1" class="reel">🍒</div>
        <div id="slot2" class="reel">🍉</div>
        <div id="slot3" class="reel">🍋</div>
    </div>
    <div class="stats">
        <div>CASH: <span id="balance">5000</span></div>
        <div>BET: 100</div>
    </div>
    <div id="status">READY TO SPIN</div>
    <button class="spin-button" id="spin-btn">SPIN</button>
</div>

<script>
    // Инициализация Telegram
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Настройки символов
    const symbols = [
        { char: '🍒', prize: 5 },
        { char: '🍉', prize: 10 },
        { char: '🍋', prize: 20 },
        { char: '7️⃣', prize: 100 }
    ];

    // Состояние игры (используем уникальный ключ для баланса v2)
    let balance = parseInt(localStorage.getItem('slot_balance_v2')) || 5000;
    let isSpinning = false;

    const balanceEl = document.getElementById('balance');
    const spinBtn = document.getElementById('spin-btn');
    const statusEl = document.getElementById('status');
    const userDisplay = document.getElementById('user-display');

    // Отображаем имя пользователя
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        userDisplay.innerText = tg.initDataUnsafe.user.first_name.toUpperCase() + "'S SLOTS";
    }

    function updateUI() {
        balanceEl.innerText = balance;
        localStorage.setItem('slot_balance_v2', balance);
    }

    function spin() {
        if (isSpinning || balance < 100) {
            if (balance < 100) statusEl.innerText = "NO CASH!";
            return;
        }

        isSpinning = true;
        balance -= 100;
        updateUI();
        
        spinBtn.disabled = true;
        statusEl.innerText = "SPINNING...";
        statusEl.style.color = "#ff0";

        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

        let iterations = 0;
        const maxIterations = 15;
        
        const interval = setInterval(() => {
            document.getElementById('slot1').innerText = symbols[Math.floor(Math.random() * symbols.length)].char;
            document.getElementById('slot2').innerText = symbols[Math.floor(Math.random() * symbols.length)].char;
            document.getElementById('slot3').innerText = symbols[Math.floor(Math.random() * symbols.length)].char;
            
            iterations++;
            if (iterations >= maxIterations) {
                clearInterval(interval);
                finishSpin();
            }
        }, 100);
    }

    function finishSpin() {
        // Честный расчет результата
        const r1 = symbols[Math.floor(Math.random() * symbols.length)];
        const r2 = symbols[Math.floor(Math.random() * symbols.length)];
        const r3 = symbols[Math.floor(Math.random() * symbols.length)];

        document.getElementById('slot1').innerText = r1.char;
        document.getElementById('slot2').innerText = r2.char;
        document.getElementById('slot3').innerText = r3.char;

        if (r1.char === r2.char && r2.char === r3.char) {
            const winAmount = 100 * r1.prize;
            balance += winAmount;
            statusEl.innerText = "WIN: +" + winAmount;
            statusEl.style.color = "#0f0";
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } else {
            statusEl.innerText = "TRY AGAIN";
            statusEl.style.color = "#ff00ff";
        }

        isSpinning = false;
        spinBtn.disabled = false;
        updateUI();
    }

    // Привязываем клик
    spinBtn.onclick = spin;

    // Первичная отрисовка
    updateUI();
</script>

</body>
</html>

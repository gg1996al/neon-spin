<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Gifts Engine v4.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app { width: 90%; max-width: 380px; text-align: center; background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Прогресс-бар уровня */
        .stats-bar { display: flex; justify-content: space-between; font-size: 12px; color: #24A1DE; margin-bottom: 8px; padding: 0 5px; font-weight: bold; }
        .xp-container { background: #000; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; border: 1px solid rgba(36, 161, 222, 0.3); }
        #xp-fill { background: linear-gradient(90deg, #24A1DE, #64b5f6); width: 0%; height: 100%; transition: 0.5s; }

        /* Баланс и кнопка BUY */
        .balance-card { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 18px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(36, 161, 222, 0.5); }
        .val { font-size: 24px; font-weight: bold; color: #ffce31; text-shadow: 0 0 10px rgba(255, 206, 49, 0.3); }
        .buy-btn { background: #24A1DE; border: none; border-radius: 12px; color: white; padding: 10px 16px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(36, 161, 222, 0.4); transition: 0.2s; }
        .buy-btn:active { transform: scale(0.95); }

        /* Игровое поле */
        .slots-container { display: flex; justify-content: space-between; background: #000; border: 2px solid #24A1DE; border-radius: 20px; height: 100px; overflow: hidden; margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(36, 161, 222, 0.2); }
        .reel { width: 32%; position: relative; }
        .reel-inner { position: absolute; width: 100%; transition: transform 3s cubic-bezier(0.15, 0, 0.05, 1); }
        .symbol { height: 100px; line-height: 100px; font-size: 50px; display: flex; align-items: center; justify-content: center; }

        /* Выбор ставки */
        .bet-selector { display: flex; gap: 8px; margin-bottom: 20px; }
        .bet-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #24A1DE; border-radius: 12px; color: #24A1DE; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .bet-btn.active { background: #24A1DE; color: white; box-shadow: 0 0 15px rgba(36, 161, 222, 0.4); }

        .play-btn { width: 100%; padding: 22px; background: linear-gradient(180deg, #24A1DE 0%, #1c82b3 100%); border: none; border-radius: 20px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(36, 161, 222, 0.3); }
        .play-btn:disabled { background: #444; box-shadow: none; opacity: 0.6; }
        
        #msg { margin-top: 15px; font-weight: bold; color: #24A1DE; min-height: 24px; font-size: 16px; }
    </style>
</head>
<body>

<div class="app">
    <div class="stats-bar">
        <span id="user-lvl">LEVEL 1</span>
        <span id="user-xp-text">XP: 0/100</span>
    </div>
    <div class="xp-container"><div id="xp-fill"></div></div>

    <div class="balance-card">
        <div style="text-align: left;">
            <div style="font-size: 10px; color: #888; margin-bottom: 2px;">ВАШИ ЗВЕЗДЫ</div>
            <span class="val" id="bal">5000</span> <span style="color:#ffce31">⭐️</span>
        </div>
        <button class="buy-btn" id="buy-btn">➕ КУПИТЬ</button>
    </div>

    <div class="slots-container">
        <div class="reel"><div id="r1" class="reel-inner"></div></div>
        <div class="reel"><div id="r2" class="reel-inner"></div></div>
        <div class="reel"><div id="r3" class="reel-inner"></div></div>
    </div>

    <div class="bet-selector">
        <button class="bet-btn active" onclick="setBet(10)">10</button>
        <button class="bet-btn" onclick="setBet(50)">50</button>
        <button class="bet-btn" onclick="setBet(100)">100</button>
    </div>

    <button class="play-btn" id="btn">ИГРАТЬ</button>
    <div id="msg">Удачи, Хайроллер!</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const CONFIG = {
        symbols: ['💎', '⭐️', '🎁', '🏆', '🦄'],
        multipliers: { '💎': 5, '⭐️': 10, '🎁': 15, '🏆': 50, '🦄': 100 },
        xpPerSpin: 15,
        xpToLevel: 100
    };

    let state = JSON.parse(localStorage.getItem('star_player_v4')) || {
        balance: 5000,
        xp: 0,
        lvl: 1
    };

    let currentBet = 10;
    let spinning = false;

    function save() {
        localStorage.setItem('star_player_v4', JSON.stringify(state));
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal').innerText = state.balance;
        document.getElementById('user-lvl').innerText = `LEVEL ${state.lvl}`;
        document.getElementById('user-xp-text').innerText = `XP: ${state.xp}/${CONFIG.xpToLevel}`;
        document.getElementById('xp-fill').style.width = `${(state.xp / CONFIG.xpToLevel) * 100}%`;
    }

    // ЛОГИКА ПОКУПКИ (Исправлено)
    document.getElementById('buy-btn').onclick = () => {
        tg.showConfirm("Пополнить баланс на 1000 ⭐️?", (confirmed) => {
            if (confirmed) {
                state.balance += 1000;
                save();
                tg.showPopup({
                    title: 'Успешно!',
                    message: '1000 звезд зачислены на ваш счет.',
                    buttons: [{type: 'ok'}]
                });
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        });
    };

    function setBet(amount) {
        if(spinning) return;
        currentBet = amount;
        document.querySelectorAll('.bet-btn').forEach(b => {
            b.classList.toggle('active', parseInt(b.innerText) === amount);
        });
        if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }

    function initReels() {
        [1,2,3].forEach(id => {
            const el = document.getElementById('r'+id);
            el.innerHTML = '';
            for(let i=0; i<60; i++) {
                const s = document.createElement('div');
                s.className = 'symbol';
                s.innerText = CONFIG.symbols[Math.floor(Math.random()*CONFIG.symbols.length)];
                el.appendChild(s);
            }
        });
    }

    async function spin() {
        if(spinning || state.balance < currentBet) {
            if(state.balance < currentBet) tg.showAlert("Недостаточно звезд!");
            return;
        }

        spinning = true;
        state.balance -= currentBet;
        save();
        
        document.getElementById('btn').disabled = true;
        document.getElementById('msg').innerText = "Вращение...";
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

        const results = [];
        [1,2,3].forEach(id => {
            const el = document.getElementById('r'+id);
            const res = CONFIG.symbols[Math.floor(Math.random()*CONFIG.symbols.length)];
            results.push(res);
            el.lastElementChild.innerText = res;
            const offset = (el.children.length - 1) * 100;
            el.style.transition = `transform ${2 + id*0.4}s cubic-bezier(0.1, 0, 0.1, 1)`;
            el.style.transform = `translateY(-${offset}px)`;
        });

        setTimeout(() => finalize(results), 3200);
    }

    function finalize(res) {
        [1,2,3].forEach((id, i) => {
            const el = document.getElementById('r'+id);
            el.style.transition = 'none';
            el.style.transform = 'translateY(0)';
            el.firstElementChild.innerText = res[i];
        });

        if(res[0] === res[1] && res[1] === res[2]) {
            const win = currentBet * CONFIG.multipliers[res[0]];
            state.balance += win;
            document.getElementById('msg').innerHTML = `<span style="color:#4caf50">ВЫИГРЫШ +${win}!</span>`;
            confetti({ particleCount: 150, spread: 60 });
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } else {
            document.getElementById('msg').innerText = "Попробуй еще раз";
        }

        // Опыт
        state.xp += CONFIG.xpPerSpin;
        if(state.xp >= CONFIG.xpToLevel) {
            state.lvl++;
            state.xp = 0;
            state.balance += 500;
            tg.showPopup({ title: 'NEW LEVEL!', message: `Уровень ${state.lvl} достигнут! +500 бонусом.`, buttons: [{type:'ok'}] });
        }

        spinning = false;
        document.getElementById('btn').disabled = false;
        save();
    }

    document.getElementById('btn').onclick = spin;
    initReels();
    updateUI();
</script>
</body>
</html>
